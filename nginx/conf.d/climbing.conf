# climbing.ge — all subdomains are routed by the Laravel app itself
# (routes/web.php domain-grouped catch-alls), so one server block
# serving the same document root handles every subdomain.

server {
    listen 80;
    server_name
        climbing.loc
        shop.climbing.loc
        blog.climbing.loc
        summit.climbing.loc
        films.climbing.loc
        user.climbing.loc
        forum.climbing.loc;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 64M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 300;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|ico|svg|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    error_log /var/log/nginx/climbing_error.log;
    access_log /var/log/nginx/climbing_access.log;
}
